name: prime_design
description: >-
  Prime Design — design system flat 2026 (Inter, cor de marca parametrizável)
  com tema, tokens e componentes reutilizáveis em Flutter.
repository: https://github.com/arivanjuniordev/prime_design
issue_tracker: https://github.com/arivanjuniordev/prime_design/issues
topics: [design-system, ui, theme, widgets, material]
version: 0.2.0
# remova publish_to e rode `dart pub publish` quando for publicar
publish_to: 'none'

environment:
  sdk: ^3.10.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Datas / dinheiro pt-BR (money.dart, export_service.dart)
  intl: ^0.20.2

  # Exportação de listas (export_service.dart / ExportButton)
  pdf: ^3.11.1
  excel: ^4.0.6
  file_saver: ^0.2.14

  # UX: skeleton loading + micro-animações
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
